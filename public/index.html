<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValidadApp - Sorvete Calebito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --cyan: #00f0ff; --violet: #b760ff; --bg: #02040d; --text: #e8f6ff; --border: rgba(0, 240, 255, 0.2); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, var(--bg) 0%, #0f1524 100%); min-height: 100vh; padding: 20px; color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(183, 96, 255, 0.1)); backdrop-filter: blur(10px); border: 1px solid var(--border); padding: 40px; border-radius: 16px; margin-bottom: 40px; border-left: 4px solid var(--cyan); }
        header h1 { font-size: 36px; color: var(--cyan); margin-bottom: 8px; font-weight: 700; }
        header p { color: #aaa; font-size: 14px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: rgba(20, 24, 41, 0.5); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; padding: 30px; }
        .card h2 { color: var(--cyan); margin-bottom: 25px; font-size: 20px; font-weight: 600; }
        label { display: block; margin-bottom: 8px; color: var(--text); font-weight: 500; font-size: 13px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px 15px; background: rgba(15, 21, 36, 0.8); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; margin-bottom: 15px; }
        input:focus, select:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 10px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--cyan), #5acdff); color: #02040d; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0, 240, 255, 0.3); }
        .btn-secondary { background: linear-gradient(135deg, var(--violet), #d3a3ff); color: #fff; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(183, 96, 255, 0.1)); border: 1px solid var(--border); padding: 25px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 42px; font-weight: 800; color: var(--cyan); margin-bottom: 8px; }
        .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .product-card { background: rgba(15, 21, 36, 0.6); border: 2px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--cyan); }
        .product-card.vencido { border-left-color: #ff6b6b; }
        .product-card.proximo { border-left-color: var(--violet); }
        .product-name { font-weight: 700; font-size: 16px; margin-bottom: 8px; }
        .product-meta { font-size: 12px; color: #aaa; margin-bottom: 10px; }
        .product-status { display: inline-block; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .status-ok { background: rgba(82, 201, 115, 0.2); color: #52c973; }
        .status-warning { background: rgba(183, 96, 255, 0.2); color: #d3a3ff; }
        .status-danger { background: rgba(255, 70, 70, 0.2); color: #ff8787; }
        .btn-danger { background: rgba(255, 70, 70, 0.2); color: #ff6b6b; padding: 8px 16px; width: auto; font-size: 12px; margin-top: 10px; }
        .tabs { display: flex; gap: 0; margin-bottom: 30px; border-bottom: 2px solid var(--border); }
        .tab { padding: 15px 20px; background: none; border: none; cursor: pointer; color: #aaa; font-weight: 600; font-size: 14px; transition: all 0.3s; position: relative; }
        .tab:hover { color: var(--cyan); }
        .tab.active { color: var(--cyan); }
        .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--cyan); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .empty { text-align: center; padding: 60px 20px; color: #aaa; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍦 ValidadApp</h1>
            <p>Sistema de gerenciamento de validade - Sorvete Calebito</p>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>➕ Adicionar Produto</h2>
                <label>Tipo</label>
                <select id="productType" onchange="updateValidity()">
                    <option value="">Selecione...</option>
                    <optgroup label="3 DIAS">
                        <option value="Suporte de Frutas (açaí)">Suporte de Frutas (açaí)</option>
                        <option value="Waffles">Waffles</option>
                    </optgroup>
                    <optgroup label="7 DIAS">
                        <option value="Atendimento (casquinhas)">Atendimento (casquinhas)</option>
                    </optgroup>
                    <optgroup label="30 DIAS">
                        <option value="Suporte de Doce de leite">Suporte de Doce de leite</option>
                        <option value="Latíssimo">Latíssimo</option>
                        <option value="Soho Cookies">Soho Cookies</option>
                    </optgroup>
                </select>
                <label>Quantidade</label>
                <input type="number" id="quantity" min="1" value="1">
                <label>Data</label>
                <input type="date" id="entryDate">
                <label>Observações</label>
                <input type="text" id="notes">
                <label>Validade</label>
                <input type="text" id="validity" readonly>
                <button class="btn btn-primary" onclick="addProduct()">➕ Adicionar</button>
            </div>

            <div class="card">
                <h2>📊 Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number" id="totalProducts">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="vencidoCount">0</div>
                        <div class="stat-label">Vencidos</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="proximoCount">0</div>
                        <div class="stat-label">Próximos</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="exportData()">📥 Exportar</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑️ Limpar</button>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('todos')">📦 Todos</button>
                <button class="tab" onclick="switchTab('vencendo')">⚠️ Vencendo</button>
            </div>
            <div id="todos" class="tab-content active">
                <div id="allProducts" class="products-grid">
                    <div class="empty">Nenhum produto</div>
                </div>
            </div>
            <div id="vencendo" class="tab-content">
                <div id="expiring" class="products-grid">
                    <div class="empty">Nenhum vencendo</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        const validity = { 'Suporte de Frutas (açaí)': 3, 'Waffles': 3, 'Atendimento (casquinhas)': 7, 'Suporte de Doce de leite': 30, 'Latíssimo': 30, 'Soho Cookies': 30 };

        document.getElementById('entryDate').valueAsDate = new Date();

        function updateValidity() {
            const type = document.getElementById('productType').value;
            const date = new Date(document.getElementById('entryDate').value);
            if (type && validity[type]) {
                const v = new Date(date);
                v.setDate(v.getDate() + validity[type]);
                document.getElementById('validity').value = v.toLocaleDateString('pt-BR');
            }
        }

        async function addProduct() {
            const type = document.getElementById('productType').value;
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            const entry = document.getElementById('entryDate').value;
            const notes = document.getElementById('notes').value;
            if (!type || !entry) { alert('Preencha!'); return; }
            const v = new Date(new Date(entry));
            v.setDate(v.getDate() + validity[type]);
            try {
                const res = await fetch(API + '/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type, quantity: qty, entryDate: entry, validity: v.toISOString().split('T')[0], notes }) });
                if (res.ok) {
                    alert('✅ Adicionado!');
                    document.getElementById('productType').value = '';
                    document.getElementById('quantity').value = '1';
                    document.getElementById('notes').value = '';
                    load();
                }
            } catch (e) { alert('Erro'); }
        }

        function days(v) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const d = new Date(v);
            d.setHours(0, 0, 0, 0);
            return Math.ceil((d - today) / (1000 * 60 * 60 * 24));
        }

        async function load() {
            try {
                const res = await fetch(API + '/products');
                const products = await res.json();
                const res2 = await fetch(API + '/stats');
                const stats = await res2.json();
                document.getElementById('totalProducts').textContent = stats.totalProducts;
                document.getElementById('vencidoCount').textContent = stats.vencidos;
                document.getElementById('proximoCount').textContent = stats.proximos;

                let allHtml = '', expHtml = '';
                if (products.length === 0) {
                    allHtml = '<div class="empty">Nenhum produto</div>';
                    expHtml = '<div class="empty">Nenhum vencendo</div>';
                } else {
                    products.forEach(p => {
                        const d = days(p.validity);
                        let status = '', cls = '', badge = '';
                        if (d < 0) { status = `🔴 Vencido há ${Math.abs(d)}d`; cls = 'vencido'; badge = 'status-danger'; }
                        else if (d === 0) { status = '🔴 HOJE'; cls = 'vencido'; badge = 'status-danger'; }
                        else if (d <= 3) { status = `🟡 ${d}d`; cls = 'proximo'; badge = 'status-warning'; }
                        else { status = `✅ ${d}d`; cls = 'ok'; badge = 'status-ok'; }

                        const card = `<div class="product-card ${cls}"><div class="product-name">${p.type}</div><div class="product-meta">📦 ${p.qty}x | 📅 ${new Date(p.entryDate).toLocaleDateString('pt-BR')} → ${new Date(p.validity).toLocaleDateString('pt-BR')}</div>${p.notes ? `<div style="font-size:11px;color:#aaa">📍 ${p.notes}</div>` : ''}<span class="product-status ${badge}">${status}</span><button class="btn btn-danger" onclick="del(${p.id})">🗑️ Deletar</button></div>`;
                        allHtml += card;
                        if (d >= 0 && d <= 3) expHtml += card;
                    });
                    if (expHtml === '') expHtml = '<div class="empty">Nenhum vencendo</div>';
                }
                document.getElementById('allProducts').innerHTML = allHtml;
                document.getElementById('expiring').innerHTML = expHtml;
            } catch (e) {}
        }

        async function del(id) {
            if (confirm('Deletar?')) {
                try {
                    await fetch(API + '/products/' + id, { method: 'DELETE' });
                    load();
                } catch (e) {}
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function exportData() {
            try {
                const res = await fetch(API + '/products');
                const products = await res.json();
                const today = new Date().toLocaleDateString('pt-BR');
                let csv = 'Produto,Qtd,Entrada,Validade\n';
                products.forEach(p => csv += `"${p.type}",${p.qty},${new Date(p.entryDate).toLocaleDateString('pt-BR')},${new Date(p.validity).toLocaleDateString('pt-BR')}\n`);
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `relatorio_${today.replace(/\//g, '-')}.csv`;
                a.click();
            } catch (e) {}
        }

        async function clearAll() {
            if (confirm('⚠️ Deletar TUDO?')) {
                try {
                    await fetch(API + '/products', { method: 'DELETE' });
                    load();
                } catch (e) {}
            }
        }

        load();
    </script>
</body>
</html>
